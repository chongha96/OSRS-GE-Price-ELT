services:
  db:
    container_name: postgres_container
    image: postgres:15-trixie
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/airflow_init.sql:/docker-entrypoint-initdb.d/airflow_init.sql
    networks:
      - my-network

  airflow:
    container_name: airflow_container
    build: .
    image: rs-price-airflow:custom
    command: standalone 
    ports:
      - "8001:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_SIZE: 30
      AIRFLOW__DATABASE__SQL_ALCHEMY_MAX_OVERFLOW: 20
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_RECYCLE: 1800
      AIRFLOW__LOGGING__REMOTE_LOGGING: "False"
      AIRFLOW__LOGGING__ENABLE_WORKER_LOG_SERVER: "False"

      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DBT_PROJECT_DIR: /opt/airflow/rs-price-project
      PYTHONPATH: "/opt/airflow/scripts:/opt/airflow/dags"

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./scripts:/opt/airflow/scripts
      - ${DBT_PROJECT_PATH}:/opt/airflow/rs-price-project
      - ${DBT_PROFILES_PATH}:/home/airflow/.dbt

    depends_on:
      - db
    networks:
      - my-network

networks:
  my-network:
    driver: bridge
